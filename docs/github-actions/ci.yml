name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
      - run: threads-auto-poster publish --file examples/posts/sample_posts.txt --dry-run --output dist/publish-result.json
      - run: python scripts/build_keynote_deck.py --output dist/keynote/threads-auto-poster-keynote.pptx
      - uses: actions/upload-artifact@v4
        with:
          name: publish-dry-run-result
          path: dist/publish-result.json
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: threads-auto-poster-keynote
          path: dist/keynote/threads-auto-poster-keynote.pptx
          if-no-files-found: error
