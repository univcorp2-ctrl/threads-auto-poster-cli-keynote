<svg width="1400" height="430" viewBox="0 0 1400 430" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="1400" height="430" rx="28" fill="#0B1020"/><text x="60" y="68" fill="white" font-family="Arial" font-size="38" font-weight="900">Posting Process</text><text x="60" y="104" fill="#CBD5E1" font-family="Arial" font-size="19">dry-runならAPI接続なし。--execute時だけ2段階publish。</text><rect x="60" y="190" width="180" height="90" rx="18" fill="#2563EB"/><text x="150" y="242" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="800">Load text</text><rect x="280" y="190" width="180" height="90" rx="18" fill="#06B6D4"/><text x="370" y="242" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="800">Validate</text><rect x="500" y="190" width="180" height="90" rx="18" fill="#22C55E"/><text x="590" y="242" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="800">Dry-run?</text><rect x="720" y="190" width="180" height="90" rx="18" fill="#F59E0B"/><text x="810" y="232" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="800">Create</text><text x="810" y="257" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="800">container</text><rect x="940" y="190" width="180" height="90" rx="18" fill="#EF4444"/><text x="1030" y="232" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="800">Publish</text><text x="1030" y="257" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="800">container</text><rect x="1160" y="190" width="180" height="90" rx="18" fill="#6366F1"/><text x="1250" y="232" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="800">Save</text><text x="1250" y="257" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="800">JSON</text><path d="M245 235H275M465 235H495M685 235H715M905 235H935M1125 235H1155" stroke="#CBD5E1" stroke-width="5" stroke-linecap="round"/><text x="590" y="318" text-anchor="middle" fill="#86EFAC" font-family="Arial" font-size="17" font-weight="700">yes: plan JSON only</text><text x="920" y="318" text-anchor="middle" fill="#FDE68A" font-family="Arial" font-size="17" font-weight="700">no + --execute: call Threads API</text></svg>
